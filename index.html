<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>스타네컷</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky0:#F0F7FF;--sky1:#D9ECFF;--sky2:#B3D6FF;--sky3:#7DB8F5;
  --cloud:#FFFFFF;--cloud2:#F5F9FF;--cloud3:#EAF3FF;
  --ink:#2A3A52;--ink2:#4A6080;--ink3:#8AA0B8;
  --sun:#FFD166;--sun2:#FFBB33;
  --rose:#FF8FAB;--rose2:#FF6B8A;
  --r:20px; --rm:14px; --rs:10px;
  --sh:0 4px 20px rgba(100,150,200,.13),0 1px 4px rgba(100,150,200,.08);
  --sh2:0 8px 32px rgba(100,150,200,.18),0 2px 8px rgba(100,150,200,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Jua','Noto Sans KR',sans-serif;
  background:var(--sky0);
  min-height:100vh;overflow-x:hidden;color:var(--ink);
}
/* 하늘 배경 */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,rgba(180,220,255,.5) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 20%,rgba(255,255,255,.7) 0%,transparent 50%),
    radial-gradient(ellipse 50% 30% at 50% 80%,rgba(200,230,255,.3) 0%,transparent 60%),
    linear-gradient(170deg,#E8F4FF 0%,#F5FAFF 50%,#EAF0FF 100%);
}
/* 구름 장식 */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;height:120px;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120px 50px at 15% 40%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(ellipse 80px 35px at 22% 55%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(ellipse 100px 45px at 70% 35%,rgba(255,255,255,.85) 0%,transparent 100%),
    radial-gradient(ellipse 70px 30px at 78% 50%,rgba(255,255,255,.75) 0%,transparent 100%);
}
input[type=file]{display:none}

/* ── 앱 레이아웃 ── */
.app{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 14px 80px}

/* ── 헤더 ── */
.hd{
  padding:24px 6px 10px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-size:1.5rem;font-weight:800;color:var(--ink);letter-spacing:-.03em;
  display:flex;align-items:center;gap:6px;
}
.logo em{color:var(--sky3);font-style:normal}
.logo .star{font-size:1.1rem;animation:twinkle 2s ease infinite}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hd-album{
  display:flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:50px;
  background:var(--cloud);color:var(--ink2);
  border:1.5px solid var(--sky2);
  font-size:.8rem;font-weight:600;cursor:pointer;
  box-shadow:var(--sh);transition:all .15s;
}
.hd-album:hover{background:var(--sky1);border-color:var(--sky3);color:var(--ink)}

/* ── 스텝 ── */
.steps{
  display:flex;align-items:center;gap:0;
  background:var(--cloud);border-radius:50px;
  padding:10px 16px;margin-bottom:14px;
  box-shadow:var(--sh);border:1.5px solid var(--sky1);
}
.si{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:var(--ink3);white-space:nowrap}
.si.on{color:var(--ink)}
.si.dn{color:var(--ink3)}
.sn{
  width:22px;height:22px;border-radius:50%;
  background:var(--sky1);border:1.5px solid var(--sky2);
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:800;color:var(--ink3);flex-shrink:0;
}
.si.on .sn{background:var(--ink);border-color:var(--ink);color:#fff}
.si.dn .sn{background:var(--sky2);border-color:var(--sky2);color:#fff}
.sline{flex:1;height:1.5px;background:var(--sky1);margin:0 5px}
.sline.dn{background:var(--sky2)}

/* ── 카드 ── */
.card{
  background:var(--cloud);border-radius:var(--r);
  border:1.5px solid var(--sky1);
  padding:20px;margin-bottom:10px;
  box-shadow:var(--sh);
}
.card-lbl{
  font-size:.68rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:14px;
}
.sec-lbl{font-size:.75rem;font-weight:700;color:var(--ink2);margin-bottom:8px}
.hint{font-size:.7rem;color:var(--ink3);margin-top:6px;line-height:1.5}
.divider{height:1px;background:var(--sky1);margin:14px 0}
.row{display:flex;gap:8px;align-items:center}
.row.end{justify-content:flex-end}
.row.center{justify-content:center}
.row.btw{justify-content:space-between}
.mt{margin-top:14px}
.mt-s{margin-top:8px}

/* ── 버튼 ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;border:none;
  font-family:'Jua','Noto Sans KR',sans-serif;
  font-size:.85rem;font-weight:700;border-radius:50px;
  padding:11px 22px;transition:all .15s;
}
.btn-p{background:var(--ink);color:#fff}
.btn-p:hover{background:var(--ink2)}
.btn-p:disabled{opacity:.35;pointer-events:none}
.btn-g{background:var(--cloud);color:var(--ink2);border:1.5px solid var(--sky2)}
.btn-g:hover{border-color:var(--ink2);color:var(--ink);background:var(--sky0)}
.btn-sky{background:var(--sky3);color:#fff}
.btn-sky:hover{background:var(--ink2)}
.btn-sky:disabled{opacity:.35;pointer-events:none}
.btn-rose{background:var(--rose);color:#fff}
.btn-rose:hover{background:var(--rose2)}
.btn-rose:disabled{opacity:.35;pointer-events:none}
.btn-sm{padding:8px 16px;font-size:.78rem}

/* ── 업로드 ── */
.upload-area{
  border:2px dashed var(--sky2);border-radius:var(--r);
  padding:36px 20px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--sky0);
}
.upload-area:hover{border-color:var(--sky3);background:var(--cloud3)}
.upload-icon{font-size:2.4rem;display:block;margin-bottom:10px}
.upload-area h3{font-size:.95rem;font-weight:700;margin-bottom:4px;color:var(--ink)}
.upload-area p{font-size:.76rem;color:var(--ink3)}
.celeb-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 2px}
.celeb-strip::-webkit-scrollbar{display:none}
.celeb-chip{
  flex-shrink:0;width:52px;height:68px;
  border-radius:var(--rs);overflow:hidden;
  border:1.5px solid var(--sky1);background:var(--sky0);position:relative;
}
.celeb-chip img{width:100%;height:100%;object-fit:contain}

/* ── 프레임 빌더 ── */
#frame-builder{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fslot{
  border-radius:var(--rs);
  border:2px dashed var(--sky2);background:var(--sky0);
  position:relative;overflow:hidden;transition:border-color .2s;
  cursor:pointer;
}
.fslot:hover{border-color:var(--sky3)}
.fslot-lbl{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  pointer-events:none;z-index:0;
}
.fslot-lbl .fn{
  width:26px;height:26px;border-radius:50%;
  background:var(--sky1);color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;
}
.fslot-lbl span{font-size:.68rem;color:var(--ink3);font-weight:600}
.fslot-add-overlay{position:absolute;inset:0;z-index:2}

/* 누끼 드래그 */
.cdrag{position:absolute;cursor:grab;touch-action:none;user-select:none;z-index:5}
.cdrag:active{cursor:grabbing}
.cdrag img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
.cdrag.sel{outline:2px solid var(--sky3);outline-offset:2px}
.crz{position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;border-radius:50%;background:var(--sky3);border:2px solid #fff;cursor:se-resize;z-index:6;display:none}
.cdrag.sel .crz{display:block}
.cdel{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--rose);color:#fff;border:none;font-size:9px;cursor:pointer;z-index:7;display:none;align-items:center;justify-content:center;padding:0}
.cdrag.sel .cdel{display:flex}

/* ── 슬롯 확대 모달 ── */
.slot-modal-bg{
  display:none;position:fixed;inset:0;background:rgba(30,50,80,.5);
  z-index:500;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.slot-modal-bg.open{display:flex}
.slot-modal{
  background:var(--cloud);border-radius:var(--r);
  padding:16px;width:90%;max-width:400px;
  box-shadow:var(--sh2);border:1.5px solid var(--sky1);
}
.slot-modal-title{
  font-size:.75rem;font-weight:800;color:var(--ink2);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;
}
.slot-modal-canvas{
  width:100%;border-radius:var(--rs);
  border:2px solid var(--sky1);background:var(--sky0);
  position:relative;overflow:hidden;margin-bottom:12px;
}
.slot-modal-canvas .cdrag{z-index:10}

/* ── 카메라 ── */
#cam-wrap{
  position:relative;border-radius:var(--r);
  overflow:hidden;background:#1a2a3a;
  border:1.5px solid var(--sky1);margin-bottom:12px;
}
#video{width:100%;display:block}
#cam-cv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cam-pill{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);color:var(--ink);
  padding:5px 14px;border-radius:50px;
  font-size:.76rem;font-weight:700;
  backdrop-filter:blur(8px);white-space:nowrap;
  border:1px solid rgba(180,210,240,.5);
  box-shadow:0 2px 8px rgba(100,150,200,.2);
}
#cam-cd{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:5.5rem;font-weight:800;color:#fff;
  text-shadow:0 4px 24px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transition:opacity .1s;
}
#cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
.thumb-row{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.sthumb{
  width:52px;height:70px;border-radius:8px;
  overflow:hidden;border:2px solid var(--sky1);
  background:var(--sky0);flex-shrink:0;position:relative;
}
.sthumb img{width:100%;height:100%;object-fit:cover}
.sthumb.taken{border-color:var(--sky3)}
.sthumb::after{
  content:attr(data-n);
  position:absolute;bottom:2px;left:0;right:0;
  text-align:center;font-size:.6rem;color:var(--ink3);font-weight:700;
}
.pill-row{display:flex;gap:5px;overflow-x:auto;padding:1px 0}
.pill-row::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:6px 14px;border-radius:50px;
  border:1.5px solid var(--sky1);background:var(--cloud);
  font-size:.76rem;font-weight:700;color:var(--ink2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  font-family:'Jua','Noto Sans KR',sans-serif;
}
.pill:hover{border-color:var(--sky3);color:var(--ink)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── 꾸미기 ── */
.deco-wrap{
  background:var(--cloud);border-radius:var(--r);
  border:1.5px solid var(--sky1);padding:16px;
  margin-bottom:10px;box-shadow:var(--sh);
}
.deco-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.deco-inp{
  flex:1;padding:9px 14px;border-radius:50px;
  border:1.5px solid var(--sky1);background:var(--sky0);
  font-size:.82rem;color:var(--ink);outline:none;
  font-family:'Jua','Noto Sans KR',sans-serif;font-weight:600;
}
.deco-inp:focus{border-color:var(--sky3)}
.deco-list{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.deco-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:var(--rs);
  background:var(--sky0);font-size:.8rem;font-weight:600;
  border:1.5px solid var(--sky1);color:var(--ink2);
}
.deco-item button{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.7rem;padding:2px 6px;font-weight:700}

/* ── 결과 필름 ── */
#result-wrap{
  display:flex;gap:16px;overflow-x:auto;
  padding:8px 4px 20px;
  scroll-snap-type:x mandatory;
}
#result-wrap::-webkit-scrollbar{height:4px}
#result-wrap::-webkit-scrollbar-thumb{background:var(--sky2);border-radius:2px}
.film-card{
  flex-shrink:0;scroll-snap-align:start;
  cursor:pointer;position:relative;
  transition:transform .2s;
  outline:3px solid transparent;outline-offset:4px;
}
.film-card:hover{transform:translateY(-3px)}
.film-card.picked{outline-color:var(--sky3)}
.film-check{
  position:absolute;top:-8px;right:-8px;
  width:22px;height:22px;border-radius:50%;
  background:var(--sky3);color:#fff;
  font-size:11px;font-weight:800;
  display:none;align-items:center;justify-content:center;
  z-index:3;box-shadow:0 2px 8px rgba(100,160,240,.3);
}
.film-card.picked .film-check{display:flex}

/* ── 앨범 ── */
.album-wrap{position:relative;overflow:hidden;border-radius:var(--r)}
.album-pages{display:flex;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.album-page{flex-shrink:0;width:100%}
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.album-item{
  border-radius:var(--rs);overflow:hidden;
  border:1.5px solid var(--sky1);cursor:pointer;
  background:var(--sky0);position:relative;
  transition:transform .15s;box-shadow:var(--sh);
}
.album-item:hover{transform:scale(1.02)}
.album-item img{width:100%;display:block}
.album-info{
  padding:7px 10px;font-size:.68rem;color:var(--ink3);
  font-weight:600;border-top:1px solid var(--sky1);
}
.album-del{
  position:absolute;top:6px;right:6px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(40,60,80,.6);color:#fff;
  border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.album-nav{
  display:flex;align-items:center;justify-content:center;
  gap:14px;margin-top:14px;
}
.album-nav-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--cloud);border:1.5px solid var(--sky2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;transition:all .15s;
  box-shadow:var(--sh);
}
.album-nav-btn:hover{background:var(--sky1);border-color:var(--sky3)}
.album-nav-btn:disabled{opacity:.3;pointer-events:none}
.album-page-info{font-size:.76rem;color:var(--ink3);font-weight:700}
.album-empty{
  text-align:center;padding:48px 20px;
  color:var(--ink3);font-size:.85rem;font-weight:600;
}
.album-empty .ei{font-size:2.8rem;margin-bottom:10px;display:block}

/* ── 피커 모달 ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(30,50,80,.45);z-index:600;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(5px);
}
.modal-bg.open{display:flex}
.modal-sheet{
  background:var(--cloud);border-radius:24px 24px 0 0;
  padding:20px 16px 32px;
  width:100%;max-width:540px;max-height:60vh;overflow-y:auto;
  border-top:2px solid var(--sky1);
}
.modal-t{font-size:.75rem;font-weight:800;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:10px}
.picker-item{text-align:center;cursor:pointer}
.picker-item img{width:60px;height:80px;object-fit:contain;border-radius:8px;border:1.5px solid var(--sky1);display:block;margin:0 auto;transition:border-color .15s}
.picker-item:hover img{border-color:var(--sky3)}
.picker-item p{font-size:.6rem;color:var(--ink3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}

/* ── 스크린 ── */
.screen{display:none}
.screen.active{display:block;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">

<!-- 헤더 -->
<div class="hd">
  <div class="logo">스타<em>네컷</em> <span class="star">✦</span></div>
  <button class="hd-album" onclick="goTo(4)">📁 앨범</button>
</div>

<!-- 스텝 -->
<div class="steps" id="steps">
  <div class="si on" id="si0"><div class="sn" id="sn0">1</div>업로드</div>
  <div class="sline" id="sl01"></div>
  <div class="si" id="si1"><div class="sn" id="sn1">2</div>프레임</div>
  <div class="sline" id="sl12"></div>
  <div class="si" id="si2"><div class="sn" id="sn2">3</div>촬영</div>
  <div class="sline" id="sl23"></div>
  <div class="si" id="si3"><div class="sn" id="sn3">4</div>완성</div>
</div>

<!-- ══ STEP 0: 업로드 ══ -->
<div class="screen active" id="sc0">
  <div class="card">
    <div class="card-lbl">연예인 이미지</div>
    <label for="celebInput">
      <div class="upload-area">
        <span class="upload-icon">🌟</span>
        <h3>누끼 이미지 업로드</h3>
        <p>배경 제거된 PNG 권장 · 여러 장 가능</p>
      </div>
    </label>
    <input type="file" id="celebInput" accept="image/*" multiple>
    <div class="celeb-strip mt-s" id="celeb-strip"></div>
    <div class="row end mt">
      <button class="btn btn-p" id="btn0" disabled onclick="goTo(1)">다음 →</button>
    </div>
  </div>
</div>

<!-- ══ STEP 1: 프레임 ══ -->
<div class="screen" id="sc1">
  <div class="card">
    <div class="card-lbl">누끼 배치</div>
    <p class="hint" style="margin-bottom:12px">슬롯을 탭하면 <strong>확대 화면</strong>에서 편하게 배치할 수 있어요 ✦</p>
    <div id="frame-builder">
      <div class="fslot" id="fs0" onclick="openSlotModal(0)"><div class="fslot-lbl"><div class="fn">1</div><span>컷 1</span></div></div>
      <div class="fslot" id="fs1" onclick="openSlotModal(1)"><div class="fslot-lbl"><div class="fn">2</div><span>컷 2</span></div></div>
      <div class="fslot" id="fs2" onclick="openSlotModal(2)"><div class="fslot-lbl"><div class="fn">3</div><span>컷 3</span></div></div>
      <div class="fslot" id="fs3" onclick="openSlotModal(3)"><div class="fslot-lbl"><div class="fn">4</div><span>컷 4</span></div></div>
    </div>
    <p class="hint mt-s">각 컷 탭 → 확대 화면에서 연예인 선택 · 드래그 · 크기 조절</p>
    <div class="row btw mt">
      <button class="btn btn-g" onclick="fullReset()">← 처음으로</button>
      <button class="btn btn-p" onclick="goTo(2)">촬영하기 →</button>
    </div>
  </div>
</div>

<!-- 슬롯 확대 모달 -->
<div class="slot-modal-bg" id="slot-modal">
  <div class="slot-modal" id="slot-modal-inner">
    <div class="slot-modal-title">
      <span id="slot-modal-title-txt">컷 1 편집</span>
      <button class="btn btn-g btn-sm" onclick="closeSlotModal()">완료</button>
    </div>
    <div class="slot-modal-canvas" id="slot-modal-canvas"></div>
    <div class="row center" style="gap:8px;flex-wrap:wrap">
      <button class="btn btn-sky btn-sm" onclick="openPickerForModal()">+ 연예인 추가</button>
      <button class="btn btn-g btn-sm" onclick="clearModalSlot()">슬롯 비우기</button>
    </div>
    <p class="hint mt-s" style="text-align:center">드래그 이동 · 오른쪽 하단 ● 크기 조절</p>
  </div>
</div>

<!-- 연예인 피커 -->
<div class="modal-bg" id="picker-modal">
  <div class="modal-sheet">

<!-- ══ STEP 2: 촬영 ══ -->
<div class="screen" id="sc2">
  <div class="card">
    <div class="row btw" style="margin-bottom:12px">

  <!-- 꾸미기 -->

  <div class="card">
    <div class="row btw" style="margin-bottom:16px">
      <div class="card-lbl" style="margin:0">내 앨범</div>
      <div class="row" style="gap:8px">
        <button class="btn btn-g btn-sm" onclick="clearAlbum()" style="color:var(--rose)">전체 삭제</button>

</div><!-- /app -->
<canvas id="hc" style="display:none"></canvas>

<script>
/* ══════════ STATE ══════════ */
const S = {
  celebs:[],
  slots:[[],[],[],[]],   // 각 컷별 누끼 배치
  shots:[null,null,null,null],
  shotRatio:null,        // 실제 촬영 비율 (height/width)
  cur:0, timer:0, filter:'none',
  busy:false, stream:null, raf:null,
  picked:new Set(),
  decos:[],
  album:[],
  albumPage:0,
  modalSlot:null,        // 현재 확대 편집 중인 슬롯 idx
  camAR:null,            // 카메라 aspect-ratio 문자열
};
const PER_PAGE = 4; // 앨범 한 페이지에 4장

const FILTERS={
  none:'',
  warm:'sepia(.3) saturate(1.4) brightness(1.05)',
  cool:'hue-rotate(18deg) saturate(.8) brightness(1.03)',
  mono:'grayscale(1)',
  vivid:'saturate(1.8) contrast(1.1)',
};

const THEMES=[
  {bg:'#FFFFFF', spr:'#EBEBEB', shot:'#F5F5F5'},
  {bg:'#151515', spr:'#2A2A2A', shot:'#202020'},
  {bg:'#FDF5EE', spr:'#EAD8C8', shot:'#F5EDE4'},
];

// 오늘 날짜 기본값
const todayStr=new Date().toISOString().slice(0,10);
document.getElementById('deco-date').value=todayStr;

/* ══════════ NAV ══════════ */
function goTo(n){
  for(let i=0;i<5;i++) document.getElementById(`sc${i}`).classList.toggle('active',i===n);
  for(let i=0;i<4;i++){
    const si=document.getElementById(`si${i}`),sn=document.getElementById(`sn${i}`);
    si.className='si'+(i===n?' on':i<n?' dn':'');
    if(i<n){sn.textContent='';sn.style.fontSize='.6rem';}
    else{sn.textContent=i+1;sn.style.fontSize='';}
  }
  ['sl01','sl12','sl23'].forEach((id,idx)=>{
    document.getElementById(id).classList.toggle('dn',idx<n);
  });
  if(n===1) setFslotRatio();
  if(n===2) initCam();
  if(n===3){ S.picked.clear(); updatePickCnt(); buildResult(); }
  if(n===4) renderAlbum();
}

// fslot + 모달 비율을 카메라 실제 비율로 맞춤
function setFslotRatio(){
  const v=document.getElementById('video');
  let ar='16/9'; // 모바일 기본값
  if(v.videoWidth && v.videoHeight) ar=`${v.videoWidth}/${v.videoHeight}`;
  for(let i=0;i<4;i++) document.getElementById(`fs${i}`).style.aspectRatio=ar;
  // 열려있는 모달도 업데이트
  const mc=document.getElementById('slot-modal-canvas');
  if(mc) mc.style.aspectRatio=ar;
  S.camAR=ar; // 나중에 모달 열 때 사용
}

/* ══════════ STEP 0 ══════════ */
document.getElementById('celebInput').addEventListener('change',e=>{
  [...e.target.files].forEach(f=>{
    const img=new Image();
    img.onload=()=>{
      S.celebs.push({img,name:f.name.replace(/\.[^.]+$/,'')});
      renderStrip();
      document.getElementById('btn0').disabled=false;
    };
    img.src=URL.createObjectURL(f);
  });
});
function renderStrip(){
  const el=document.getElementById('celeb-strip'); el.innerHTML='';
  S.celebs.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='celeb-chip';
    const img=document.createElement('img'); img.src=c.img.src;
    d.appendChild(img); el.appendChild(d);
  });
}

/* ══════════ STEP 1: 슬롯 확대 모달 ══════════ */
function openSlotModal(idx){
  S.modalSlot=idx;
  document.getElementById('slot-modal-title-txt').textContent=`컷 ${idx+1} 편집`;
  // fslot과 동일한 비율 사용
  const v=document.getElementById('video');
  const mc=document.getElementById('slot-modal-canvas');
  if(v.videoWidth && v.videoHeight){
    mc.style.aspectRatio=`${v.videoWidth}/${v.videoHeight}`;
  } else if(S.camAR){
    mc.style.aspectRatio=S.camAR;
  } else {
    mc.style.aspectRatio='16/9';
  }
  renderModalCanvas(idx);
  document.getElementById('slot-modal').classList.add('open');
}
function closeSlotModal(){
  document.getElementById('slot-modal').classList.remove('open');
  // 미니 슬롯에 반영
  renderMiniSlot(S.modalSlot);
  S.modalSlot=null;
}
function clearModalSlot(){
  if(S.modalSlot===null) return;
  S.slots[S.modalSlot]=[];
  renderModalCanvas(S.modalSlot);
}

function renderModalCanvas(idx){
  const container=document.getElementById('slot-modal-canvas');
  container.innerHTML='';
  container.style.background='#F5F8FC';

  S.slots[idx].forEach((entry,ei)=>{
    const cel=S.celebs[entry.ci]; if(!cel) return;
    const el=document.createElement('div'); el.className='cdrag';
    el.style.cssText=`left:${entry.x}%;top:${entry.y}%;width:${entry.w}%;aspect-ratio:${cel.img.width}/${cel.img.height};`;
    const img=document.createElement('img'); img.src=cel.img.src; img.draggable=false;
    el.appendChild(img);
    const del=document.createElement('button'); del.className='cdel'; del.textContent='✕';
    del.onclick=e=>{ e.stopPropagation(); S.slots[idx].splice(ei,1); renderModalCanvas(idx); };
    el.appendChild(del);
    const rz=document.createElement('div'); rz.className='crz'; el.appendChild(rz);
    el.addEventListener('pointerdown',e=>{
      if(e.target===rz) return;
      e.stopPropagation();
      container.querySelectorAll('.cdrag').forEach(d=>d.classList.remove('sel'));
      el.classList.add('sel');
      doDrag(e,container,entry,el);
    });
    rz.addEventListener('pointerdown',e=>{ e.stopPropagation(); doResize(e,container,entry,el); });
    container.appendChild(el);
  });
  // 빈 곳 클릭 → 선택 해제
  container.addEventListener('pointerdown',e=>{
    if(e.target===container) container.querySelectorAll('.cdrag').forEach(d=>d.classList.remove('sel'));
  });
}

// 미니 슬롯 썸네일 업데이트 (모달 닫은 후)
function renderMiniSlot(idx){
  const slot=document.getElementById(`fs${idx}`);
  slot.querySelectorAll('.mini-thumb,.mini-canvas').forEach(e=>e.remove());
  if(!S.slots[idx].length) return;
  const mc=document.createElement('canvas');
  mc.className='mini-canvas';
  mc.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;';
  slot.appendChild(mc);
  function draw(){
    const W=slot.getBoundingClientRect().width||slot.offsetWidth||100;
    const H=slot.getBoundingClientRect().height||slot.offsetHeight||75;
    if(W<2||H<2){ setTimeout(draw,60); return; }
    mc.width=Math.round(W*2); mc.height=Math.round(H*2); // 레티나 대응
    mc.style.width='100%'; mc.style.height='100%';
    const ctx=mc.getContext('2d');
    ctx.clearRect(0,0,mc.width,mc.height);
    // fslot·모달·오버레이 모두 같은 비율 → % 그대로 사용
    S.slots[idx].forEach(entry=>{
      const cel=S.celebs[entry.ci]; if(!cel) return;
      const cw=mc.width*(entry.w/100);
      const ch=cw*(cel.img.height/cel.img.width);
      ctx.drawImage(cel.img, mc.width*(entry.x/100), mc.height*(entry.y/100), cw, ch);
    });
  }
  setTimeout(draw,80);
}

function openPickerForModal(){
  if(S.modalSlot===null) return;
  const grid=document.getElementById('picker-grid'); grid.innerHTML='';
  S.celebs.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='picker-item';
    const img=document.createElement('img'); img.src=c.img.src;
    const p=document.createElement('p'); p.textContent=c.name;
    d.appendChild(img); d.appendChild(p);
    d.onclick=()=>{ addToSlotFromModal(S.modalSlot,i); closePicker(); };
    grid.appendChild(d);
  });
  document.getElementById('picker-modal').classList.add('open');
}
function closePicker(){ document.getElementById('picker-modal').classList.remove('open'); }

function addToSlotFromModal(si,ci){
  S.slots[si].push({ci,x:20,y:8,w:55});
  renderModalCanvas(si);
}

function doDrag(e,container,entry,el){
  e.preventDefault();
  const r=container.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,ox=entry.x,oy=entry.y;
  el.setPointerCapture(e.pointerId);
  const mv=ev=>{ entry.x=Math.max(-entry.w/2,Math.min(100-entry.w/2,ox+((ev.clientX-sx)/r.width)*100)); entry.y=Math.max(-5,Math.min(95,oy+((ev.clientY-sy)/r.height)*100)); el.style.left=entry.x+'%'; el.style.top=entry.y+'%'; };
  const up=()=>{ el.removeEventListener('pointermove',mv); el.removeEventListener('pointerup',up); };
  el.addEventListener('pointermove',mv); el.addEventListener('pointerup',up);
}
function doResize(e,container,entry,el){
  e.preventDefault();
  const r=container.getBoundingClientRect(),sx=e.clientX,ow=entry.w;
  el.setPointerCapture(e.pointerId);
  const mv=ev=>{ entry.w=Math.max(10,Math.min(120,ow+((ev.clientX-sx)/r.width)*100)); el.style.width=entry.w+'%'; };
  const up=()=>{ el.removeEventListener('pointermove',mv); el.removeEventListener('pointerup',up); };
  el.addEventListener('pointermove',mv); el.addEventListener('pointerup',up);
}

/* ══════════ STEP 2: 카메라 ══════════ */
async function initCam(){
  if(S.stream) return;
  try{
    // 모바일 세로 대응: width/height 둘 다 ideal 지정
    S.stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    const v=document.getElementById('video');
    v.srcObject=S.stream; await v.play();
    // videoWidth/Height가 확정된 후 슬롯 비율 맞춤
    const waitRatio=()=>{
      if(v.videoWidth && v.videoHeight){
        setFslotRatio();
        runOverlay();
      } else {
        setTimeout(waitRatio, 50);
      }
    };
    waitRatio();
  }catch(err){ alert('카메라 권한이 필요합니다.\nhttps:// 환경에서 실행해 주세요.'); }
}

function getSlotCelebs(idx){ return S.slots[idx]||[]; }

function runOverlay(){
  const v=document.getElementById('video'),oc=document.getElementById('cam-cv'),ctx=oc.getContext('2d');
  function frame(){
    if(!v.videoWidth){ S.raf=requestAnimationFrame(frame); return; }
    // canvas 해상도를 video 실제 해상도에 맞춤
    if(oc.width!==v.videoWidth || oc.height!==v.videoHeight){
      oc.width=v.videoWidth; oc.height=v.videoHeight;
    }
    ctx.clearRect(0,0,oc.width,oc.height);
    getSlotCelebs(S.cur).forEach(e=>{
      const c=S.celebs[e.ci]; if(!c) return;
      const cw=oc.width*(e.w/100),ch=cw*(c.img.height/c.img.width);
      ctx.drawImage(c.img,oc.width*(e.x/100),oc.height*(e.y/100),cw,ch);
    });
    if(!S.busy) S.raf=requestAnimationFrame(frame);
  }
  frame();
}

document.querySelectorAll('.pill[data-f]').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.pill[data-f]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S.filter=b.dataset.f; document.getElementById('video').style.filter=FILTERS[S.filter]||''; };
});
document.querySelectorAll('.timer-pill').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.timer-pill').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S.timer=+b.dataset.s; };
});

async function shoot(){
  if(S.busy||S.cur>=4) return;
  S.busy=true; cancelAnimationFrame(S.raf);
  const cd=document.getElementById('cam-cd');
  if(S.timer>0){
    cd.style.opacity='1';
    await new Promise(res=>{ let t=S.timer; cd.textContent=t; const iv=setInterval(()=>{ t--; if(t<=0){clearInterval(iv);res();}else cd.textContent=t; },1000); });
    cd.style.opacity='0';
  }
  const fl=document.getElementById('cam-flash');
  fl.style.transition='none'; fl.style.opacity='1';
  setTimeout(()=>{ fl.style.transition='opacity .3s'; fl.style.opacity='0'; },80);

  const v=document.getElementById('video'),hc=document.getElementById('hc');
  hc.width=v.videoWidth||640; hc.height=v.videoHeight||480;
  // 실제 촬영 비율 저장 (필름 빌더에서 사용)
  if(!S.shotRatio && hc.width && hc.height) S.shotRatio=hc.height/hc.width;
  const ctx=hc.getContext('2d');
  ctx.filter=FILTERS[S.filter]||'';
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(v,-hc.width,0,hc.width,hc.height); ctx.restore();
  ctx.filter='';
  // overlay canvas를 그대로 합성 (별도 좌표 계산 없이 이중 방지)
  const oc=document.getElementById('cam-cv');
  if(oc.width>0 && oc.height>0){
    ctx.drawImage(oc,0,0,hc.width,hc.height);
  }
  const url=hc.toDataURL('image/jpeg',.92);
  S.shots[S.cur]=url;
  const th=document.getElementById(`th${S.cur}`); th.innerHTML=`<img src="${url}">`; th.classList.add('taken');
  S.cur++;
  document.getElementById('shot-lbl').textContent=`${S.cur} / 4 촬영`;
  document.getElementById('cam-pill').textContent=S.cur<4?`컷 ${S.cur+1} 준비`:'촬영 완료! ✦';
  if(S.cur>=4){
    document.getElementById('btn-done').removeAttribute('disabled');
    document.getElementById('btn-shoot').setAttribute('disabled','');
  }
  S.busy=false; runOverlay();
}

// 다시 찍기 — 같은 프레임, 촬영만 리셋
function reshot(){
  if(S.stream){ S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
  cancelAnimationFrame(S.raf); S.raf=null;
  S.shots=[null,null,null,null]; S.shotRatio=null; S.cur=0; S.busy=false;
  for(let i=0;i<4;i++){ const th=document.getElementById(`th${i}`); th.innerHTML=''; th.classList.remove('taken'); }
  document.getElementById('shot-lbl').textContent='0 / 4 촬영';
  document.getElementById('cam-pill').textContent='컷 1 준비';
  const bs=document.getElementById('btn-shoot');
  const bd=document.getElementById('btn-done');
  if(bs) bs.removeAttribute('disabled');
  if(bd) bd.setAttribute('disabled','');
  goTo(2);
}

// 처음부터 — 전체 리셋
function fullReset(){
  if(S.stream){ S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
  cancelAnimationFrame(S.raf); S.raf=null;
  S.shots=[null,null,null,null]; S.cur=0; S.busy=false;
  for(let i=0;i<4;i++){ const th=document.getElementById(`th${i}`); th.innerHTML=""; th.classList.remove("taken"); }
  document.getElementById("shot-lbl").textContent="0 / 4 촬영";
  document.getElementById("cam-pill").textContent="컷 1 준비";
  const bshoot=document.getElementById('btn-shoot');
  const bdone=document.getElementById('btn-done');
  if(bshoot){ bshoot.removeAttribute('disabled'); bshoot.style.pointerEvents=''; bshoot.style.opacity=''; }
  if(bdone){ bdone.setAttribute('disabled',''); }
  S.camAR=null;
  S.celebs=[]; S.slots=[[],[],[],[]]; S.decos=[];
  document.getElementById('celeb-strip').innerHTML='';
  document.getElementById('btn0').disabled=true;
  document.getElementById('deco-list').innerHTML='';
  for(let i=0;i<4;i++){
    const slot=document.getElementById(`fs${i}`);
    slot.querySelectorAll('.mini-thumb,.mini-canvas').forEach(e=>e.remove());
    slot.style.aspectRatio=''; // 비율 초기화
  }
  S.shotRatio=null;
  goTo(0);
}

/* ══════════ STEP 3: 꾸미기 ══════════ */
function addDeco(type){
  if(type==='text'){
    const v=document.getElementById('deco-txt').value.trim(); if(!v) return;
    S.decos.push({type:'text',val:v}); document.getElementById('deco-txt').value='';
  } else {
    const v=document.getElementById('deco-date').value; if(!v) return;
    const d=new Date(v);
    const fmt=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    S.decos.push({type:'date',val:fmt});
  }
  renderDecoList(); buildResult();
}
function renderDecoList(){
  const el=document.getElementById('deco-list'); el.innerHTML='';
  S.decos.forEach((d,i)=>{
    const row=document.createElement('div'); row.className='deco-item';
    const span=document.createElement('span'); span.textContent=(d.type==='date'?'📅 ':'')+d.val;
    const btn=document.createElement('button'); btn.textContent='삭제';
    btn.onclick=()=>{ S.decos.splice(i,1); renderDecoList(); buildResult(); };
    row.appendChild(span); row.appendChild(btn); el.appendChild(row);
  });
}

/* ══════════ STEP 3: 필름 빌더 ══════════ */
function buildResult(){
  S.picked.clear(); updatePickCnt();
  const wrap=document.getElementById('result-wrap'); wrap.innerHTML='';

  const FW=220, SPR=18, PAD=8, GAP=5;
  const SW=FW-PAD*2;
  // 실제 촬영 이미지 비율로 슬롯 높이 결정 (없으면 4:3 기본값)
  let shotRatio=3/4;
  const firstShot=S.shots.find(s=>s);
  // 첫 번째 촬영 이미지에서 실제 비율 읽기
  // (비동기이므로 미리 저장된 S.shotRatio 활용)
  if(S.shotRatio) shotRatio=S.shotRatio;
  const SH=Math.round(SW*shotRatio);
  const FOOTER_H=SPR+22;
  const totalH=SPR+PAD+(SH+GAP)*4-GAP+PAD+FOOTER_H;

  THEMES.forEach((th,ti)=>{
    const canvas=document.createElement('canvas');
    canvas.width=FW; canvas.height=totalH;
    const ctx=canvas.getContext('2d');

    // 필름 배경
    ctx.fillStyle=th.bg; ctx.fillRect(0,0,FW,totalH);

    // 상단 스프로킷
    ctx.fillStyle=th.spr; ctx.fillRect(0,0,FW,SPR);
    drawSprockets(ctx,FW,SPR,th.bg,0);

    // 하단 스프로킷
    ctx.fillStyle=th.spr; ctx.fillRect(0,totalH-FOOTER_H,FW,FOOTER_H);
    drawSprockets(ctx,FW,SPR,th.bg,totalH-FOOTER_H);

    // 촬영 사진 로드
    const loads=S.shots.map((shot,si)=>new Promise(res=>{
      if(!shot){res(null);return;}
      const img=new Image(); img.onload=()=>res(img); img.onerror=()=>res(null); img.src=shot;
    }));

    Promise.all(loads).then(imgs=>{
      imgs.forEach((img,si)=>{
        const x=PAD, y=SPR+PAD+si*(SH+GAP);
        // 슬롯 배경
        ctx.fillStyle=th.shot; ctx.fillRect(x,y,SW,SH);
        if(img){
          // cover 방식 — 슬롯을 꽉 채우고 중앙 기준으로 크롭
          const scale=Math.max(SW/img.width,SH/img.height);
          const iw=img.width*scale,ih=img.height*scale;
          const ox=x+SW/2-iw/2,oy=y+SH/2-ih/2;
          ctx.save();
          ctx.beginPath();
          ctx.rect(x,y,SW,SH);
          ctx.clip();
          ctx.drawImage(img,ox,oy,iw,ih);
          ctx.restore();
        }
        // 누끼 오버레이 — beginPath 필수 (없으면 path 누적으로 클립 범위 깨짐)
        S.slots[si].forEach(entry=>{
          const cel=S.celebs[entry.ci]; if(!cel) return;
          const cw=SW*(entry.w/100),ch=cw*(cel.img.height/cel.img.width);
          ctx.save();
          ctx.beginPath();
          ctx.rect(x,y,SW,SH);
          ctx.clip();
          ctx.drawImage(cel.img,x+SW*(entry.x/100),y+SH*(entry.y/100),cw,ch);
          ctx.restore();
        });
        // 슬롯 테두리
        ctx.strokeStyle=th.spr; ctx.lineWidth=1; ctx.strokeRect(x,y,SW,SH);
      });

      // 꾸미기 텍스트 — 첫 번째 슬롯 위에 오버레이
      if(S.decos.length){
        const baseY=SPR+PAD+6;
        S.decos.forEach((deco,di)=>{
          ctx.fillStyle=ti===1?'rgba(255,255,255,.82)':'rgba(40,60,80,.72)';
          ctx.font=`600 ${deco.type==='date'?10:11}px Nunito, sans-serif`;
          ctx.textAlign='left';
          ctx.fillText(deco.val,PAD+4,baseY+di*14);
        });
      }

      // 하단 날짜 (오늘 날짜 자동)
      const todayFmt=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace('.','');
      ctx.fillStyle=ti===1?'rgba(255,255,255,.4)':'rgba(80,100,120,.45)';
      ctx.font=`700 9px Nunito,sans-serif`; ctx.textAlign='center';
      ctx.fillText(todayFmt,FW/2,totalH-7);
    });

    canvas.style.cssText=`display:block;width:124px;height:${124/FW*totalH}px;`;

    const card=document.createElement('div'); card.className='film-card'; card.id=`fc${ti}`;
    const mark=document.createElement('div'); mark.className='film-check'; mark.textContent='✓';
    card.appendChild(canvas); card.appendChild(mark);
    card.addEventListener('click',()=>{
      if(S.picked.has(ti)){S.picked.delete(ti);card.classList.remove('picked');}
      else{S.picked.add(ti);card.classList.add('picked');}
      updatePickCnt();
    });
    wrap.appendChild(card);
  });
}

function drawSprockets(ctx,fw,sh,holeColor,offsetY=0){
  const hw=10,hh=7,hr=2,count=6,spacing=fw/count;
  for(let i=0;i<count;i++){
    const hx=spacing*i+spacing/2-hw/2,hy=offsetY+sh/2-hh/2;
    ctx.fillStyle=holeColor;
    ctx.beginPath(); ctx.roundRect(hx,hy,hw,hh,hr); ctx.fill();
  }
}

function updatePickCnt(){ document.getElementById('pick-cnt').textContent=S.picked.size; }

function dlPicked(){
  if(!S.picked.size){alert('저장할 필름을 먼저 선택해주세요');return;}
  S.picked.forEach(i=>{ const c=document.querySelector(`#fc${i} canvas`); if(!c)return; c.toBlob(blob=>{ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`스타네컷_${Date.now()}.png`; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},500); },'image/png'); });
}

/* ══════════ 앨범 ══════════ */
function loadAlbum(){
  try{
    const d=localStorage.getItem('stn_v4_album');
    if(d) S.album=JSON.parse(d);
  }catch(e){}
}
function persistAlbum(){
  try{ localStorage.setItem('stn_v4_album',JSON.stringify(S.album)); }catch(e){}
}
function saveToAlbum(){
  if(!S.picked.size){alert('저장할 필름을 먼저 선택해주세요');return;}
  S.picked.forEach(i=>{
    const c=document.querySelector(`#fc${i} canvas`); if(!c)return;
    S.album.unshift({
      id:Date.now()+i,
      data:c.toDataURL('image/jpeg',.88),
      date:new Date().toLocaleDateString('ko-KR'),
    });
  });
  persistAlbum();
  alert(`${S.picked.size}장 앨범에 저장됐어요 ✦`);
  goTo(4);
}
function clearAlbum(){
  if(!confirm('앨범 전체를 삭제할까요?'))return;
  S.album=[]; persistAlbum(); renderAlbum();
}

function renderAlbum(){
  S.albumPage=0;
  const pages=document.getElementById('album-pages'); pages.innerHTML='';
  if(!S.album.length){
    pages.innerHTML='<div class="album-page"><div class="album-empty"><span class="ei">☁️</span>저장된 사진이 없어요</div></div>';
    document.getElementById('album-page-info').textContent='0 / 0';
    document.getElementById('album-prev').disabled=true;
    document.getElementById('album-next').disabled=true;
    return;
  }
  const totalPages=Math.ceil(S.album.length/PER_PAGE);
  for(let p=0;p<totalPages;p++){
    const page=document.createElement('div'); page.className='album-page';
    const grid=document.createElement('div'); grid.className='album-grid';
    const items=S.album.slice(p*PER_PAGE,(p+1)*PER_PAGE);
    items.forEach((item,j)=>{
      const idx=p*PER_PAGE+j;
      const el=document.createElement('div'); el.className='album-item';
      const img=document.createElement('img'); img.src=item.data;
      const info=document.createElement('div'); info.className='album-info'; info.textContent=item.date;
      const del=document.createElement('button'); del.className='album-del'; del.textContent='✕';
      del.onclick=e=>{ e.stopPropagation(); S.album.splice(idx,1); persistAlbum(); renderAlbum(); };
      img.onclick=()=>{ const w=window.open(); w.document.write(`<style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh}</style><img src="${item.data}" style="max-width:100%;max-height:100vh;">`); };
      el.appendChild(img); el.appendChild(info); el.appendChild(del); grid.appendChild(el);
    });
    page.appendChild(grid); pages.appendChild(page);
  }
  updateAlbumPage(totalPages);
}

function updateAlbumPage(totalPages){
  const pages=document.getElementById('album-pages');
  const tp=totalPages||Math.ceil(S.album.length/PER_PAGE);
  pages.style.transform=`translateX(-${S.albumPage*100}%)`;
  document.getElementById('album-page-info').textContent=`${S.albumPage+1} / ${tp}`;
  document.getElementById('album-prev').disabled=S.albumPage===0;
  document.getElementById('album-next').disabled=S.albumPage>=tp-1;
}

function albumNav(dir){
  const tp=Math.ceil(S.album.length/PER_PAGE);
  S.albumPage=Math.max(0,Math.min(tp-1,S.albumPage+dir));
  updateAlbumPage(tp);
}

// 앨범 스와이프
(function(){
  const wrap=document.getElementById('album-wrap');
  let startX=0,dragging=false;
  wrap.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=true;},{passive:true});
  wrap.addEventListener('touchend',e=>{
    if(!dragging)return; dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>40) albumNav(dx<0?1:-1);
  },{passive:true});
})();

loadAlbum();
</script>
